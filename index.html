<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawzPlay — Coming Soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background-image: url('pawzplay-bg.png');
      background-size: contain;
      background-position: center top;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-color: #bfe0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 260px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.05) 0%,
        rgba(0, 0, 0, 0.02) 40%,
        rgba(0, 0, 0, 0.22) 100%
      );
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 0 24px;
      text-align: center;
    }

    .brand-name {
      font-size: 52px;
      font-weight: 900;
      color: #111111;
      letter-spacing: -1px;
      line-height: 1;
    }

    .tagline {
      margin-top: 8px;
      font-size: 20px;
      font-weight: 700;
      color: #111111;
    }

    .tagline span {
      color: #C9952A;
    }

    .coming-soon {
      margin-top: 16px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .coming-soon .coming {
      color: #111111;
    }

    .coming-soon .soon {
      color: #C9952A;
    }

    .social-buttons {
      margin-top: 28px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease;
      border: 2px solid #111111;
      color: #111111;
      background: rgba(255,255,255,0.30);
      backdrop-filter: blur(8px);
    }

    .btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.50);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      fill: #111111;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      body {
        padding-top: 40px;
        background-image: url('pawzplay-bg-mobile.png');
        background-attachment: scroll;
        background-size: 100% auto;
        background-position: top center;
        background-color: #bfe0f0;
      }
      .brand-name {
        font-size: 32px;
      }
      .tagline {
        font-size: 15px;
      }
      .coming-soon {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="content">

    <div class="brand-name">PawzPlay</div>

    <div class="tagline">Your dog pulls. <span>You don't.</span></div>

    <div class="coming-soon">
      <span class="coming">Coming</span>
      <span class="soon">Soon</span>
    </div>
